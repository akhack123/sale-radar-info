<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="description" content="Sale Radarの公開案内ページ">
  <title>Sale Radar</title>

  <style>
    :root {
      color-scheme: light;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Noto Sans JP",
        sans-serif;
      line-height: 1.7;
      color: #17343a;
      background: #f5fbfa;
    }

    body {
      margin: 0;
      padding: 32px 20px;
    }

    main {
      max-width: 720px;
      margin: 64px auto;
      padding: 40px;
      background: #ffffff;
      border: 1px solid #d9ebe8;
      border-radius: 20px;
      box-shadow: 0 12px 36px rgba(24, 92, 87, 0.08);
    }

    h1 {
      margin-top: 0;
      color: #087f78;
      font-size: clamp(2rem, 6vw, 3rem);
    }

    h2 {
      margin-top: 2rem;
      font-size: 1.2rem;
    }

    p {
      margin: 1rem 0;
    }

    .status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e7f7f4;
      color: #086d67;
      font-weight: 700;
    }

    footer {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid #d9ebe8;
      color: #597176;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <main>
    <p class="status">開発・技術検証中</p>

    <h1>Sale Radar</h1>

    <p>
      Sale Radarは、EC商品の価格情報を利用者が確認しやすい形で
      提供するサービスとして開発中です。
    </p>

    <h2>楽天市場の商品情報について</h2>

    <p>
      楽天市場の商品情報を利用する場合は、
      楽天市場の商品ページへ案内します。
    </p>

    <p>
      現在は、楽天APIへの接続および価格情報処理機能の
      技術検証段階です。
    </p>

    <h2>現在の公開状態</h2>

    <p>
      実商品データ、価格履歴、レビュー、
      アフィリエイトリンクは現在掲載していません。
    </p>

    <footer>
      <p>Sale Radar 開発案内ページ</p>
    </footer>
  </main>
</body>
</html>
